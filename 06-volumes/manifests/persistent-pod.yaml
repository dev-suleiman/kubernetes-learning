apiVersion: v1
kind: Pod
metadata:
  name: persistent-test
spec:
  containers:
    - name: writer
      image: busybox
      command: ["sh", "-c", "echo 'this data will survive' > /data/persistent.txt && sleep 3600"]
      volumeMounts:
        - name: persistent-storage
          mountPath: /data
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: local-pvc