apiVersion: v1
kind: Pod
metadata:
  name: volume-test
spec:
  containers:
   - name: writer
     image: busybox
     command: ["sh", "-c", "echo 'hello from volume' > /data/hello.txt && sleep 3600"]
     volumeMounts:
      - name: shared-data
        mountPath: /data
   - name: reader
     image: busybox
     command: ["sh", "-c", "sleep 5 && cat /data/hello.txt && sleep 3600"]
     volumeMounts:
      - name: shared-data
        mountPath: /data
  volumes: 
   - name: shared-data
     emptyDir: {}